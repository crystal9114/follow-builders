version: "3.8"

services:
  follow-builders:
    build: .
    image: crystalwind-follow-builders:latest
    container_name: follow-builders
    command: ["node", "scripts/run-digest.js", "scheduled"]
    # 凭证（SILICONFLOW_API_KEY / WECOM_WEBHOOK_URL）来自密匣 mixia，
    # 改值/重启规则见 mixia secrets/registry.md；项目 .env 放最后可覆盖兜底
    env_file:
      - /www/wwwroot/mixia/secrets/company/common.env
      - .env
    environment:
      - TZ=Asia/Shanghai
      - DIGEST_TIME=09:00
      - MAX_DIGEST_ITEMS=10
      - FEED_BASE_URL=https://raw.githubusercontent.com/zarazhangrui/follow-builders/main
      - PROMPTS_BASE_URL=https://raw.githubusercontent.com/crystal9114/follow-builders/main/prompts
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    dns:
      - 223.5.5.5
      - 8.8.8.8
