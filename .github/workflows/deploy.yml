name: Deploy Follow Builders

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "."
          target: "/www/wwwroot/follow-builders"
          overwrite: true
          strip_components: 0

      - name: Rebuild and restart container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 15m
          script: |
            set -e
            echo "===== deploy follow-builders $(date '+%Y-%m-%d %H:%M:%S') ====="
            cd /www/wwwroot/follow-builders

            # 凭证（SILICONFLOW_API_KEY / WECOM_WEBHOOK_URL）已迁密匣 mixia，
            # 由 compose env_file 引用 /www/wwwroot/mixia/secrets/company/common.env
            {
              printf '%s\n' 'SILICONFLOW_MODEL=deepseek-ai/DeepSeek-V4-Flash'
              printf '%s\n' 'SILICONFLOW_API_BASE=https://api.siliconflow.cn/v1'
              printf '%s\n' 'SILICONFLOW_TIMEOUT_MS=240000'
              printf '%s\n' 'SILICONFLOW_REASONING_EFFORT=high'
              printf '%s\n' 'WECOM_MSGTYPE=markdown'
              printf '%s\n' 'DIGEST_TIME=09:00'
              printf '%s\n' 'DIGEST_TEMPERATURE=0.4'
              printf '%s\n' 'DIGEST_MAX_TOKENS=4096'
              printf '%s\n' 'MAX_CONTEXT_CHARS=60000'
              printf '%s\n' 'MAX_DIGEST_ITEMS=10'
              printf '%s\n' 'WECOM_ITEM_DELAY_MS=1500'
              printf '%s\n' 'DEDUP_RETENTION_DAYS=30'
            } > .env

            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            else
              COMPOSE="docker-compose"
            fi

            $COMPOSE down 2>/dev/null || true
            $COMPOSE up -d --build
            docker image prune -f
            docker ps --filter name=follow-builders --format "table {{.Names}}\t{{.Status}}\t{{.Command}}"
